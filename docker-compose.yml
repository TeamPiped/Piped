services:

  # ── Frontend + router (only exposed port) ────────────────────────────────────
  # nginx serves the static frontend and routes /api/* and /math/* internally.
  # Point your reverse proxy at PORT (default 8091).
  # Caddy example:  piped.example.com { reverse_proxy localhost:8091 }
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:80"
    depends_on:
      - pipe
      - edu-relay

  # ── Piped Backend (Java / NewPipe Extractor) ─────────────────────────────────
  pipe:
    image: 1337kavin/piped:latest
    restart: unless-stopped
    volumes:
      - ./config/piped.properties:/app/config.properties:ro
    expose:
      - "8080"
    depends_on:
      post:
        condition: service_healthy

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  post:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: piped
      POSTGRES_USER: piped
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piped -d piped"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Education content relay (yt-dlp based) ───────────────────────────────────
  edu-relay:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    stop_grace_period: 15s

volumes:
  postgres_data:
