services:

  # ── Frontend + router (the only exposed port) ────────────────────────────────
  # nginx serves the static frontend AND routes /api/* and /math/* internally.
  # Point your external reverse proxy at PORT (default 8091).
  # e.g. in Caddy:  reverse_proxy localhost:8091
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:80"
    environment:
      # Full backend URL injected into index.html at startup.
      # With single-domain routing the frontend auto-detects via window.location.origin/api.
      # Only set this if your backend lives at a different origin.
      BACKEND_URL: ${PIPED_EXTERNAL_URL:+${PIPED_EXTERNAL_URL}/api}
    depends_on:
      - pipedapi
      - edu-relay

  # ── Piped Backend (Java / NewPipe Extractor) ─────────────────────────────────
  pipedapi:
    image: 1337kavin/piped:latest
    restart: unless-stopped
    volumes:
      # Copy config/piped.properties.example → config/piped.properties and edit it.
      - ./config/piped.properties:/app/config.properties:ro
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL for Piped Backend ─────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: piped
      POSTGRES_USER: piped
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piped -d piped"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Education content relay (yt-dlp based) ───────────────────────────────────
  edu-relay:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    stop_grace_period: 15s

volumes:
  postgres_data:
