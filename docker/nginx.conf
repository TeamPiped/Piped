map $http_x_forwarded_proto $real_scheme {
    default  $scheme;
    https    https;
    http     http;
}

upstream pipe {
    server pipe:8080;
    keepalive 32;
}

upstream edurelay {
    server edu-relay:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    error_log /dev/stderr warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Piped Backend API ────────────────────────────────────────────────────
    # sub_filter rewrites the placeholder origin (set in piped.properties) to
    # the real request origin at response time — enabling true BYOD with no
    # domain configuration required.
    location /api/ {
        proxy_pass http://pipe/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        # Disable upstream gzip so sub_filter can process the response body
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 60s;

        # CORS: override the backend's static FRONTEND_URL with the actual origin
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Vary Origin always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Rewrite placeholder domain + path to the live request origin.
        # Order: specific (placeholder + /proxy/) before generic (placeholder alone).
        sub_filter 'http://placeholder.invalid/proxy/' '$real_scheme://$host/calculus/';
        sub_filter 'http://placeholder.invalid'        '$real_scheme://$host';
        sub_filter_once off;
        sub_filter_types application/json text/javascript;
    }

    # ── /calculus/ — renamed Piped media path (was /proxy/) ─────────────────
    # nginx rewrites back to /proxy/ before forwarding so the backend sees its
    # own internal path name.
    location /calculus/ {
        rewrite ^/calculus/(.*)$ /proxy/$1 break;
        proxy_pass http://pipe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ── YouTube video streams ────────────────────────────────────────────────
    location /videoplayback {
        proxy_pass http://pipe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ── Education content relay (/math/ prefix stripped before forwarding) ───
    location /math/ {
        proxy_pass http://edurelay/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ── SPA frontend ─────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        error_page 404 =200 /index.html;
    }
}
