upstream pipedapi {
    server pipedapi:8080;
    keepalive 32;
}

upstream edurelay {
    server edu-relay:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    error_log /dev/stderr warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Piped Backend API ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://pipedapi/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # ── Piped media stream paths (served at root by the backend) ─────────────
    location /videoplayback {
        proxy_pass http://pipedapi;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /proxy/ {
        proxy_pass http://pipedapi;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # ── Education content relay (/math/ prefix stripped before forwarding) ───
    location /math/ {
        proxy_pass http://edurelay/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ── SPA frontend ─────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        error_page 404 =200 /index.html;
    }
}
